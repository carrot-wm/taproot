[build]
target = "x86_64-unknown-linux-gnu"

# no build-std: cdylib links the *precompiled* std, but -nodefaultlibs drops
# glibc and c-gull (ABI-compatible) satisfies std's libc calls instead.
[target.x86_64-unknown-linux-gnu]
rustflags = [
    # no glibc under our libc; export the c-gull symbols; name it libc.so.6
    "-C", "link-arg=-nodefaultlibs",
    "-C", "link-arg=-Wl,--export-dynamic",
    "-C", "link-arg=-Wl,-soname,libc.so.6",
]
